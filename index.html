<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Premium Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="app">
        <header>
            <div class="header-inner">
                <div class="logo">
                    <span class="logo-icon">◇</span>
                    <span>TaskFlow</span>
                </div>
                <div class="header-stats">
                    <span id="totalTasks">0 tasks</span>
                    <span class="divider">|</span>
                    <span id="completedTasks">0 done</span>
                </div>
            </div>
        </header>

        <main>
            <div class="hero-text">
                <span class="badge">Simplify Your Day</span>
                <h1>Stay in <span class="gradient-text">Flow</span></h1>
                <p>Manage tasks with laser focus. Clean. Fast. Beautiful.</p>
            </div>

            <div class="task-card">
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="What needs to be done?" autofocus>
                    <button id="addBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Add
                    </button>
                </div>

                <div class="filter-bar">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>

                <ul id="taskList"></ul>
            </div>
        </main>

        <footer>
            <p>Press <kbd>Enter</kbd> to add · Click <kbd>Complete</kbd> to toggle · <kbd>Delete</kbd> to remove</p>
        </footer>
    </div>

    <script src="index.js"></script>
</body>
</html>
